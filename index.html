<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>🎂 Happy Birthday Quỳnh 🎂</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      background: #0a0a0f;
      font-family: 'Segoe UI', sans-serif;
      height: 100vh;
      overflow: hidden;
    }

    /* ══════════════════════════════════════
       DOOR SCREEN
    ══════════════════════════════════════ */
    #doorScreen {
      position: fixed;
      inset: 0;
      z-index: 999;
      cursor: pointer;
      overflow: hidden;
    }
    .door-panel {
      position: absolute;
      top: 0;
      width: 50%;
      height: 100%;
      background: #0d0d1a;
      transition: transform 1.2s cubic-bezier(0.77, 0, 0.18, 1);
      overflow: hidden;
    }
    .door-panel::before {
      content: '';
      position: absolute;
      inset: 0;
      background: linear-gradient(135deg, #1a0a2e 0%, #0d0d1a 50%, #0a0a0f 100%);
    }
    .door-panel::after {
      content: '';
      position: absolute;
      inset: 0;
      background: repeating-linear-gradient(180deg,
        transparent 0px, transparent 38px,
        rgba(255,255,255,0.03) 38px, rgba(255,255,255,0.03) 40px);
    }
    .door-left  { left: 0;  border-right: 2px solid rgba(255,182,193,0.25);
                  box-shadow: inset -4px 0 20px rgba(255,182,193,0.08); }
    .door-right { right: 0; border-left:  2px solid rgba(255,182,193,0.25);
                  box-shadow: inset  4px 0 20px rgba(255,182,193,0.08); }
    .door-left  .knob { right: -14px; }
    .door-right .knob { left:  -14px; }
    .knob {
      position: absolute; top: 50%; transform: translateY(-50%);
      width: 28px; height: 28px; border-radius: 50%; z-index: 2;
      background: radial-gradient(circle at 35% 35%, #ffcc70, #c8860a);
      box-shadow: 0 0 12px rgba(255,204,112,0.6), 0 2px 6px rgba(0,0,0,0.6);
    }
    .door-center-text {
      position: absolute; top: 50%; left: 50%;
      transform: translate(-50%, -50%);
      z-index: 10; text-align: center; pointer-events: none; white-space: nowrap;
    }
    .door-center-text .door-icon {
      font-size: 56px; display: block; margin-bottom: 16px;
      animation: pulse 2s ease-in-out infinite;
    }
    .door-center-text .door-label {
      font-size: 15px; color: rgba(255,255,255,0.75);
      letter-spacing: 3px; text-transform: uppercase;
    }
    .door-center-text .door-sub {
      font-size: 12px; color: rgba(255,182,193,0.6);
      letter-spacing: 2px; margin-top: 8px;
    }
    @keyframes pulse {
      0%,100% { transform: scale(1);   filter: drop-shadow(0 0 8px  rgba(255,182,193,0.4)); }
      50%     { transform: scale(1.1); filter: drop-shadow(0 0 18px rgba(255,182,193,0.9)); }
    }
    .door-left.open  { transform: perspective(1200px) rotateY(-110deg); transform-origin: left center; }
    .door-right.open { transform: perspective(1200px) rotateY(110deg);  transform-origin: right center; }
    #doorScreen.fade-out { opacity: 0; transition: opacity 0.5s ease 1s; pointer-events: none; }

    /* ══════════════════════════════════════
       NAME FORM OVERLAY
    ══════════════════════════════════════ */
    #nameOverlay {
      position: fixed;
      inset: 0;
      z-index: 888;
      display: none;
      align-items: center;
      justify-content: center;
      background: rgba(0,0,0,0.75);
      backdrop-filter: blur(8px);
    }
    #nameOverlay.show { display: flex; }

    .name-box {
      background: linear-gradient(135deg, #1a0a2e, #0d0d1a);
      border: 1px solid rgba(255,182,193,0.3);
      border-radius: 20px;
      padding: 40px 48px;
      text-align: center;
      box-shadow: 0 0 60px rgba(255,182,193,0.15);
      max-width: 380px;
      width: 90%;
    }
    .name-box .nb-icon { font-size: 48px; margin-bottom: 12px; }
    .name-box h2 {
      color: #fff; font-size: 18px; letter-spacing: 1px;
      margin-bottom: 6px;
    }
    .name-box p {
      color: rgba(255,182,193,0.7); font-size: 13px;
      margin-bottom: 24px;
    }
    .name-box input {
      width: 100%;
      background: rgba(255,255,255,0.07);
      border: 1px solid rgba(255,182,193,0.35);
      border-radius: 10px;
      color: #fff;
      font-size: 15px;
      padding: 12px 16px;
      outline: none;
      transition: border 0.2s;
      margin-bottom: 16px;
    }
    .name-box input::placeholder { color: rgba(255,255,255,0.3); }
    .name-box input:focus { border-color: #ff9dbb; }
    .name-box button {
      width: 100%;
      background: linear-gradient(90deg, #ff9dbb, #ffcc70);
      border: none;
      border-radius: 10px;
      color: #1a0a2e;
      font-size: 15px;
      font-weight: 700;
      padding: 13px;
      cursor: pointer;
      letter-spacing: 1px;
      transition: opacity 0.2s, transform 0.15s;
    }
    .name-box button:hover  { opacity: 0.9; transform: scale(1.02); }
    .name-box button:active { transform: scale(0.97); }

    /* ══════════════════════════════════════
       SLIDESHOW
    ══════════════════════════════════════ */
    .slideshow {
      position: relative; width: 100vw; height: 100vh;
      display: flex; align-items: center; justify-content: center;
    }
    .slide {
      position: absolute; inset: 0;
      display: flex; align-items: center; justify-content: center;
      opacity: 0; transition: opacity 0.8s ease-in-out; pointer-events: none;
    }
    .slide.active { opacity: 1; pointer-events: all; }
    .slide img {
      max-width: 100vw; max-height: 100vh;
      width: auto; height: auto;
      object-fit: contain;
      user-select: none; -webkit-user-drag: none;
      transform-origin: center center;
    }
    .slide::before {
      content: ''; position: absolute; inset: 0;
      background: radial-gradient(ellipse at center, transparent 60%, rgba(0,0,0,0.6) 100%);
      pointer-events: none; z-index: 1;
    }

    /* Ken Burns */
    @keyframes kb-zoom-in   { from { transform: scale(1)    translate(0,0); }  to { transform: scale(1.08) translate(0,0); } }
    @keyframes kb-zoom-out  { from { transform: scale(1.08) translate(0,0); }  to { transform: scale(1)    translate(0,0); } }
    @keyframes kb-pan-right { from { transform: scale(1.05) translate(-2%,0); } to { transform: scale(1.05) translate(2%,0); } }
    @keyframes kb-pan-left  { from { transform: scale(1.05) translate(2%,0); }  to { transform: scale(1.05) translate(-2%,0); } }
    @keyframes kb-pan-up    { from { transform: scale(1.05) translate(0,2%); }  to { transform: scale(1.05) translate(0,-2%); } }
    @keyframes kb-pan-down  { from { transform: scale(1.05) translate(0,-2%); } to { transform: scale(1.05) translate(0,2%); } }
    .kb-zoom-in   img { animation: kb-zoom-in   var(--kb-dur) ease-in-out forwards; }
    .kb-zoom-out  img { animation: kb-zoom-out  var(--kb-dur) ease-in-out forwards; }
    .kb-pan-right img { animation: kb-pan-right var(--kb-dur) ease-in-out forwards; }
    .kb-pan-left  img { animation: kb-pan-left  var(--kb-dur) ease-in-out forwards; }
    .kb-pan-up    img { animation: kb-pan-up    var(--kb-dur) ease-in-out forwards; }
    .kb-pan-down  img { animation: kb-pan-down  var(--kb-dur) ease-in-out forwards; }

    /* Progress bar */
    .progress-bar {
      position: fixed; top: 0; left: 0; height: 3px;
      background: linear-gradient(90deg, #ff9dbb, #ffcc70);
      width: 0%; transition: width linear; z-index: 200;
    }

    /* Caption */
    .caption {
      position: fixed; top: 18px; left: 50%; transform: translateX(-50%);
      color: rgba(255,255,255,0.7); font-size: 13px;
      letter-spacing: 2px; text-transform: uppercase;
      z-index: 100; pointer-events: none;
    }

    /* Floating hearts */
    .hearts { position: fixed; inset: 0; pointer-events: none; overflow: hidden; z-index: 0; }
    .heart  { position: absolute; bottom: -40px; font-size: 20px; opacity: 0; animation: floatUp linear infinite; }
    @keyframes floatUp {
      0%   { transform: translateY(0)      rotate(0deg);   opacity: 0.8; }
      100% { transform: translateY(-110vh) rotate(360deg); opacity: 0; }
    }

    /* Dots */
    .dots-bar {
      position: fixed; bottom: 24px; left: 50%; transform: translateX(-50%);
      display: flex; gap: 8px; z-index: 100;
    }
    .dot { width: 7px; height: 7px; border-radius: 50%; background: rgba(255,255,255,0.3); transition: background .25s, transform .25s; }
    .dot.active { background: #ff9dbb; transform: scale(1.5); }

    /* ══════════════════════════════════════
       REACTION PANEL
    ══════════════════════════════════════ */
    #reactionPanel {
      position: fixed;
      right: 18px;
      bottom: 60px;
      z-index: 300;
      display: none;
      flex-direction: column;
      align-items: flex-end;
      gap: 8px;
    }
    #reactionPanel.show { display: flex; }

    /* Greeting badge */
    #greetBadge {
      background: rgba(0,0,0,0.55);
      backdrop-filter: blur(10px);
      border: 1px solid rgba(255,182,193,0.25);
      border-radius: 20px;
      color: rgba(255,255,255,0.8);
      font-size: 12px;
      padding: 5px 12px;
      white-space: nowrap;
    }

    /* Emoji buttons */
    .emoji-btns {
      display: flex;
      flex-direction: column;
      gap: 6px;
      align-items: flex-end;
    }
    .emoji-btn {
      background: rgba(0,0,0,0.55);
      backdrop-filter: blur(10px);
      border: 1px solid rgba(255,255,255,0.12);
      border-radius: 50px;
      color: #fff;
      font-size: 20px;
      padding: 8px 14px;
      cursor: pointer;
      display: flex;
      align-items: center;
      gap: 6px;
      transition: background 0.2s, transform 0.15s;
      white-space: nowrap;
    }
    .emoji-btn:hover  { background: rgba(255,255,255,0.15); transform: scale(1.08); }
    .emoji-btn:active { transform: scale(0.95); }
    .emoji-btn .ecount {
      font-size: 11px;
      color: rgba(255,255,255,0.6);
      min-width: 16px;
      text-align: center;
    }

    /* ══════════════════════════════════════
       REACTION FEED (floating pop-ups)
    ══════════════════════════════════════ */
    #reactionFeed {
      position: fixed;
      right: 80px;
      bottom: 60px;
      z-index: 300;
      display: flex;
      flex-direction: column-reverse;
      gap: 6px;
      pointer-events: none;
      max-width: 220px;
    }
    .feed-item {
      background: rgba(0,0,0,0.6);
      backdrop-filter: blur(8px);
      border: 1px solid rgba(255,182,193,0.2);
      border-radius: 20px;
      padding: 6px 12px;
      font-size: 13px;
      color: #fff;
      display: flex;
      align-items: center;
      gap: 6px;
      animation: feedIn 0.35s ease, feedOut 0.4s ease 4.6s forwards;
      white-space: nowrap;
    }
    @keyframes feedIn  { from { opacity:0; transform: translateX(20px); } to { opacity:1; transform: translateX(0); } }
    @keyframes feedOut { from { opacity:1; } to { opacity:0; } }
  </style>
</head>
<body>

<!-- Door screen -->
<div id="doorScreen" onclick="openDoor()">
  <div class="door-panel door-left"><div class="knob"></div></div>
  <div class="door-panel door-right"><div class="knob"></div></div>
  <div class="door-center-text">
    <span class="door-icon">🎂</span>
    <div class="door-label">Happy Birthday Quỳnh</div>
    <div class="door-sub">Nhấn để mở cửa ✨</div>
  </div>
</div>

<!-- Name form overlay -->
<div id="nameOverlay">
  <div class="name-box">
    <div class="nb-icon">🎀</div>
    <h2>Xin chào bạn!</h2>
    <p>Cho Quỳnh biết bạn là ai nhé 💕</p>
    <input id="nameInput" type="text" placeholder="Tên bạn là..." maxlength="30" autocomplete="off" />
    <button onclick="submitName()">Vào xem thôi ✨</button>
  </div>
</div>

<!-- Floating hearts -->
<div class="hearts" id="hearts"></div>

<!-- Caption -->
<div class="caption">🎂 Happy Birthday Quỳnh 🎂</div>

<!-- Progress bar -->
<div class="progress-bar" id="progressBar"></div>

<!-- Slideshow -->
<div class="slideshow" id="slideshow"></div>

<!-- Dots -->
<div class="dots-bar" id="dotsBar"></div>

<!-- Reaction feed (floating pop-ups) -->
<div id="reactionFeed"></div>

<!-- Reaction panel -->
<div id="reactionPanel">
  <div id="greetBadge">👋 Xin chào!</div>
  <div class="emoji-btns" id="emojiBtns"></div>
</div>

<script src="/socket.io/socket.io.js"></script>
<script>
  // ── Config ───────────────────────────────────────────────────
  const v = '?v=2';
  const images = [
    { src: '1.png' + v, alt: 'Chúc Mừng Sinh Nhật 20 tuổi' },
    { src: '2.png' + v, alt: 'Happy Birthday - Nhóm bạn' },
    { src: '3.png' + v, alt: 'HLE Team chibi' },
    { src: '4.png' + v, alt: 'Zeka - HLE collage' },
    { src: '5.png' + v, alt: 'Hanwha Life Esports' },
    { src: '6.png' + v, alt: 'HLE cyber edit' },
    { src: '7.png' + v, alt: 'Gumayusi - The Reliable Ace' },
    { src: '8.png' + v, alt: 'Worlds 25 - Cinemax' },
    { src: '9.png' + v, alt: 'The End 🩷' },
  ];

  const EMOJIS = [
    { emoji: '🥰', label: 'Yêu thích' },
    { emoji: '🎉', label: 'Chúc mừng' },
    { emoji: '😍', label: 'Tuyệt vời' },
    { emoji: '🩷', label: 'Thương thương' },
    { emoji: '🔥', label: 'Xịn xò' },
  ];

  const INTERVAL = 4000;

  // ── State ────────────────────────────────────────────────────
  let current = 0;
  let playing = false;
  let timer   = null;
  let userName = '';

  // Đếm số lần mỗi emoji được bấm (key = emoji)
  const emojiCounts = {};
  EMOJIS.forEach(e => emojiCounts[e.emoji] = 0);

  // ── Socket.IO ────────────────────────────────────────────────
  const socket = io();

  socket.on('init', (items) => {
    items.forEach(item => {
      emojiCounts[item.emoji] = (emojiCounts[item.emoji] || 0) + 1;
    });
    renderEmojiCounts();
  });

  socket.on('react', (item) => {
    emojiCounts[item.emoji] = (emojiCounts[item.emoji] || 0) + 1;
    renderEmojiCounts();
    showFeedItem(item);
  });

  // ── Build Slideshow DOM ──────────────────────────────────────
  const slideshow = document.getElementById('slideshow');
  const dotsBar   = document.getElementById('dotsBar');

  images.forEach((img, i) => {
    const slide = document.createElement('div');
    slide.className = 'slide' + (i === 0 ? ' active' : '');
    slide.id = 'slide-' + i;
    const image = document.createElement('img');
    image.src = img.src; image.alt = img.alt; image.draggable = false;
    slide.appendChild(image);
    slideshow.appendChild(slide);

    const dot = document.createElement('div');
    dot.className = 'dot' + (i === 0 ? ' active' : '');
    dotsBar.appendChild(dot);
  });

  // ── Build Emoji Buttons ──────────────────────────────────────
  const emojiBtns = document.getElementById('emojiBtns');

  function renderEmojiCounts() {
    emojiBtns.innerHTML = '';
    EMOJIS.forEach(e => {
      const btn = document.createElement('button');
      btn.className = 'emoji-btn';
      btn.innerHTML = `${e.emoji} <span style="font-size:11px;color:rgba(255,255,255,0.7)">${e.label}</span>
                       <span class="ecount">${emojiCounts[e.emoji] || 0}</span>`;
      btn.onclick = () => sendReaction(e.emoji, e.label);
      emojiBtns.appendChild(btn);
    });
  }
  renderEmojiCounts();

  // ── Reaction send ────────────────────────────────────────────
  function sendReaction(emoji, label) {
    socket.emit('react', { emoji, label, name: userName });
  }

  // ── Reaction feed pop-up ─────────────────────────────────────
  const feed = document.getElementById('reactionFeed');
  function showFeedItem(item) {
    const el = document.createElement('div');
    el.className = 'feed-item';
    el.innerHTML = `<span>${item.emoji}</span><span>${item.name} <span style="color:rgba(255,182,193,0.8)">${item.label}</span></span>`;
    feed.prepend(el);
    setTimeout(() => el.remove(), 5100);
  }

  // ── Ken Burns ────────────────────────────────────────────────
  const KB = ['kb-zoom-in','kb-zoom-out','kb-pan-right','kb-pan-left','kb-pan-up','kb-pan-down'];
  function applyKenBurns(el) {
    KB.forEach(c => el.classList.remove(c));
    const cls = KB[Math.floor(Math.random() * KB.length)];
    el.style.setProperty('--kb-dur', (INTERVAL + 800) + 'ms');
    const img = el.querySelector('img');
    img.style.animation = 'none';
    el.classList.add(cls);
    void img.offsetWidth;
    img.style.animation = '';
  }

  // ── Navigation ───────────────────────────────────────────────
  function goTo(n) {
    document.getElementById('slide-' + current).classList.remove('active');
    dotsBar.children[current].classList.remove('active');
    current = (n + images.length) % images.length;
    const s = document.getElementById('slide-' + current);
    s.classList.add('active');
    dotsBar.children[current].classList.add('active');
    applyKenBurns(s);
    resetProgress();
  }

  function changeSlide(dir) {
    const next = current + dir;
    if (next >= images.length) {
      clearInterval(timer); playing = false;
      const bar = document.getElementById('progressBar');
      bar.style.transition = 'none'; bar.style.width = '0%';
      return;
    }
    goTo(next);
    if (playing) restartTimer();
  }

  function startTimer()   { timer = setInterval(() => changeSlide(1), INTERVAL); }
  function restartTimer() { clearInterval(timer); startTimer(); }

  // ── Progress bar ─────────────────────────────────────────────
  function resetProgress() {
    const bar = document.getElementById('progressBar');
    bar.style.transition = 'none'; bar.style.width = '0%';
    if (playing) {
      requestAnimationFrame(() => requestAnimationFrame(() => {
        bar.style.transition = `width ${INTERVAL}ms linear`;
        bar.style.width = '100%';
      }));
    }
  }

  // ── Floating hearts ──────────────────────────────────────────
  const heartsEl   = document.getElementById('hearts');
  const heartChars = ['💕','💗','🩷','✨','⭐','🌸','🎀'];
  function spawnHeart() {
    const h = document.createElement('span');
    h.className = 'heart';
    h.textContent = heartChars[Math.floor(Math.random() * heartChars.length)];
    h.style.left = Math.random() * 100 + 'vw';
    h.style.fontSize = (12 + Math.random() * 18) + 'px';
    const dur = 6 + Math.random() * 8;
    h.style.animationDuration = dur + 's';
    h.style.animationDelay = (Math.random() * 4) + 's';
    heartsEl.appendChild(h);
    setTimeout(() => h.remove(), (dur + 4) * 1000);
  }
  setInterval(spawnHeart, 800);

  // ── Door → Form → Slideshow flow ─────────────────────────────
  function openDoor() {
    const screen = document.getElementById('doorScreen');
    screen.querySelector('.door-left').classList.add('open');
    screen.querySelector('.door-right').classList.add('open');
    screen.classList.add('fade-out');
    setTimeout(() => {
      screen.style.display = 'none';
      // Hiện form nhập tên
      document.getElementById('nameOverlay').classList.add('show');
      document.getElementById('nameInput').focus();
    }, 1600);
  }

  function submitName() {
    const input = document.getElementById('nameInput');
    const val = input.value.trim();
    if (!val) { input.focus(); return; }
    userName = val;

    // Ẩn form
    document.getElementById('nameOverlay').classList.remove('show');

    // Hiện reaction panel với tên
    document.getElementById('greetBadge').textContent = `👋 Xin chào, ${userName}!`;
    document.getElementById('reactionPanel').classList.add('show');

    // Bắt slideshow
    playing = true;
    applyKenBurns(document.getElementById('slide-0'));
    startTimer();
    resetProgress();
  }

  // Enter để submit form
  document.getElementById('nameInput').addEventListener('keydown', e => {
    if (e.key === 'Enter') submitName();
  });
</script>
</body>
</html>
